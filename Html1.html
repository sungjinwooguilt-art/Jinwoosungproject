<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Cssdash/One.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="profilecard">
        <div class="img">
            <img src="sung-jinwoo-solo-2048x2048-17972.jpg" alt="" class="imagepic">
        </div>
        <div class="text">
            <span class="name">Sung Jinwoo</span>
            <span class="job">Shadow Monarch</span>
        </div>
        <div class="media">
            <a href="#" class="link" style="background-color: blue;">
                <i class="fa-brands fa-facebook"></i></a>
            <a href="#" class="link" style="background-color:rgb(199, 95, 95);">
                <i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="link" style="background-color: skyblue;">
                <i class="fa-brands fa-twitter"></i></a>
            <a href="#" class="link" style="background-color: red;">
                <i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="buttons">
            <button class="button">Follow</button>
            <button class="button">Message</button>
        </div>
        <div class="analyze">
            <div class="data">
                <i class="fa-regular fa-heart"></i>
                <span class="number">1M</span>
            </div>
            <div class="data">
                <i class="fa-regular fa-comment"></i>
                <span class="number">15M</span>
            </div>
            <div class="data">
                <i class="fa-regular fa-share-from-square"></i>
                <span class="number">20M</span>
            </div>
        </div>
    </div>
</body>
</html>
