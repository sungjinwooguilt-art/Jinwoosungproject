<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Cssdash/Two.css">
</head>
<body>
    <section>
        <div class="container">
            <div class="cardfront">
                <header>
                    <span class="logo">
                        <img src="mastercard-removebg-preview.png" alt="">
                    </span>
                    <img src="Chip-removebg-preview.png" alt="" class="chip">
                </header>

                <div class="card-detail">
                    <div class="name-number">
                        <h6>Card Number</h6>
                        <h5 class="number">
                            1234 5678 9012 3456
                        </h5>
                        <h4 class="name">
                            Chan Rothso Vityea
                        </h4>
                    </div>
                    <div class="valid">
                        <h6>Expired Date</h6>
                        <h5>10/30</h5>
                    </div>
                </div>
            </div>
            <div class="cardback">
                <div class="black-stripe"></div>
                <div class="back-content">
                    <div class="cvv-area">
                    <h6>Authorized Signature</h6>
                    <div class="signature-bar">
                    <span class="cvv">123</span>
                </div>
            </div>
            <p class="disclaimer">
                This card is property of Rothso Bank. If found, please return to the nearest branch. 
                Customer Service: +855 12 345 678
            </p>
        </div>
        </div>
    </section>
</body>
</html>
