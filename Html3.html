<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Card</title>
    <link rel="stylesheet" href="../Cssdash/Three.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="card">
        
        <img src="https://i.pinimg.com/736x/bd/5e/e2/bd5ee26ae29a26bcceaa8737a0cce544.jpg" alt="Profile Picture" class="profile-img">
        
        <div class="content">
            <h1 class="name">Chan Rothso Vityea</h1>
            <p class="title">Frontend Developer</p>
            <p class="bio">Building clean interfaces and learning something new every single day.</p>
        </div>

        <div class="actions">
        <input type="checkbox" id="follow-toggle" class="state-handler">
        <label for="follow-toggle" class="btn-primary">
        <span class="text-default">Follow</span>
        <span class="text-active">Following</span>
        </label>

        <input type="checkbox" id="msg-toggle" class="state-handler">
        <label for="msg-toggle" class="btn-secondary">
        <span class="text-default">Message</span>
        <span class="text-active">Sent!</span>
        </label>
        <hr>
</div>

        <div class="socials">
            <a href="https://www.facebook.com/meas.vanratha/" class="social-link" target="_blank"><i class="fa-brands fa-facebook"></i>
            facebook
            </a>
            <a href="https://www.tiktok.com/@izana_kurokawa100" class="social-link" target="_blank"><i class="fa-brands fa-tiktok"></i>
            tiktok
            </a>
            <a href="https://www.instagram.com/tii_beloyal/" class="social-link" target="_blank"><i class="fa-brands fa-instagram"></i>
            instagram
            </a>
            <a href="https://t.me/Jinwoosung300" class="social-link" target="_blank"><i class="fa-brands fa-telegram"></i>
            telegram
            </a>
        </div>
    </div>
</body>
</html>
